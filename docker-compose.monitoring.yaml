# Docker Compose - Monitoring (Prometheus + Grafana)
# Usage : docker compose -f docker-compose.yaml -f docker-compose.monitoring.yaml up -d
#
# Grafana : http://localhost:3000 (admin/admin)
# Prometheus : http://localhost:9090

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: kickstarter-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - kickstarter

  grafana:
    image: grafana/grafana:10.4.0
    container_name: kickstarter-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - kickstarter

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: kickstarter-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - kickstarter

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: kickstarter-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-kickstarter}:${POSTGRES_PASSWORD:-kickstarter}@database:5432/${POSTGRES_DB:-kickstarter}?sslmode=disable"
    depends_on:
      - database
    networks:
      - kickstarter

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: kickstarter-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      - redis
    networks:
      - kickstarter

volumes:
  prometheus_data:
  grafana_data:

networks:
  kickstarter:
    external: true
