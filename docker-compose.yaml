services:
  nginx:
    image: nginx:1.25-alpine
    container_name: kickstarter-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./api/public:/var/www/api/public:ro
    depends_on:
      - php
      - node
    networks:
      - kickstarter

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: kickstarter-php
    restart: unless-stopped
    volumes:
      - ./api:/var/www/api
    depends_on:
      - database
      - redis
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DATABASE_URL: "postgresql://kickstarter:kickstarter@database:5432/kickstarter?serverVersion=16&charset=utf8"
      MAILER_DSN: "smtp://mailpit:1025"
      REDIS_URL: "redis://redis:6379"
    networks:
      - kickstarter

  node:
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    container_name: kickstarter-node
    restart: unless-stopped
    ports:
      - "${NODE_PORT:-3010}:5173"
    volumes:
      - ./front:/var/www/front
      - front_node_modules:/var/www/front/node_modules
    networks:
      - kickstarter

  database:
    image: postgres:16-alpine
    container_name: kickstarter-database
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: kickstarter
      POSTGRES_USER: kickstarter
      POSTGRES_PASSWORD: kickstarter
    volumes:
      - database_data:/var/lib/postgresql/data
    networks:
      - kickstarter

  redis:
    image: redis:7-alpine
    container_name: kickstarter-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    networks:
      - kickstarter

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: kickstarter-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: '${MEILI_MASTER_KEY:-kickstarter_meili_key}'
      MEILI_ENV: development
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - kickstarter

  mercure:
    image: dunglas/mercure
    container_name: kickstarter-mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: '${MERCURE_JWT_SECRET:-ChangeThisMercureHubJWTSecretKey}'
      MERCURE_SUBSCRIBER_JWT_KEY: '${MERCURE_JWT_SECRET:-ChangeThisMercureHubJWTSecretKey}'
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://localhost:${NODE_PORT:-3010} http://localhost:${NGINX_PORT:-8080}
        anonymous
    ports:
      - "${MERCURE_PORT:-3001}:80"
    networks:
      - kickstarter

  mailpit:
    image: axllent/mailpit
    container_name: kickstarter-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8026}:8025"
      - "${MAILPIT_SMTP_PORT:-1026}:1025"
    networks:
      - kickstarter

volumes:
  database_data:
  front_node_modules:
  meilisearch_data:

networks:
  kickstarter:
    driver: bridge
