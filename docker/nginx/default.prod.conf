# Configuration Nginx production
# Sert l'API Symfony via PHP-FPM et les fichiers React buildes

server {
    listen 80;
    server_name localhost;

    root /var/www/api/public;

    # En-tetes de securite complets
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Taille maximale des requetes
    client_max_body_size 25M;

    # Compression Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ---------------------------------------------------------------
    # API Symfony (FastCGI vers PHP-FPM)
    # ---------------------------------------------------------------

    # Assets statiques Symfony (bundles, uploads)
    location ~ ^/(bundles|media|uploads)/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Routes API et back-office Symfony
    location ~ ^/(api|bundles|_wdt|_profiler|_error) {
        try_files $uri /index.php$is_args$args;
    }

    # Front controller Symfony
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;

        # Empecher l'acces direct au front controller
        internal;
    }

    # Bloquer l'acces aux fichiers .php non autorises
    location ~ \.php$ {
        return 404;
    }

    # ---------------------------------------------------------------
    # Frontend React (fichiers statiques buildes)
    # ---------------------------------------------------------------

    # Assets frontend avec cache long (fichiers avec hash Vite)
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/front/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Toutes les autres requetes : SPA React
    location / {
        root /var/www/front/dist;
        try_files $uri $uri/ /index.html;
    }

    # Bloquer l'acces aux fichiers caches
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
