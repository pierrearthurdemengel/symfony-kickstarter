server {
    listen 80;
    server_name localhost;

    root /var/www/api/public;

    # En-tetes de securite
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Taille maximale des requetes
    client_max_body_size 25M;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Assets statiques Symfony (bundles, images, etc.)
    location ~ ^/(bundles|media|uploads)/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API et back-office Symfony (FastCGI vers PHP-FPM)
    location ~ ^/(api|bundles|_wdt|_profiler|_error) {
        try_files $uri /index.php$is_args$args;
    }

    # Front controller Symfony
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;

        # Empecher l'acces direct au front controller
        internal;
    }

    # Bloquer l'acces aux fichiers .php non autorises
    location ~ \.php$ {
        return 404;
    }

    # Proxy vers le serveur de dev Node/Vite (front React)
    location / {
        proxy_pass http://node:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
