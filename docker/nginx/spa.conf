# Configuration Nginx pour SPA React en production (standalone)
# Utilise par docker/node/Dockerfile.prod

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # En-tetes de securite
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Taille maximale des requetes
    client_max_body_size 10M;

    # Compression Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Assets statiques avec cache long (fichiers avec hash Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback vers index.html pour le routing React (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloquer l'acces aux fichiers caches
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
