; Configuration PHP optimisee pour la production
; Ce fichier est charge en complement de php.ini

[PHP]
; Limites strictes pour la production
memory_limit = 128M
max_execution_time = 30
max_input_time = 30
post_max_size = 25M
upload_max_filesize = 20M
max_file_uploads = 10

; Desactiver l'affichage des erreurs
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /proc/self/fd/2

; Dates et encodage
date.timezone = Europe/Paris
default_charset = UTF-8

; Sessions securisees
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax

; OPcache - optimisations production
[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000

; Ne pas verifier les timestamps des fichiers (pas de modif en prod)
opcache.validate_timestamps = 0

; Preloading Symfony (decommenter apres configuration)
; opcache.preload = /var/www/api/config/preload.php
; opcache.preload_user = www-data

; JIT - optimisation supplementaire
opcache.jit = 1255
opcache.jit_buffer_size = 64M

; Realpath cache - TTL eleve en production
realpath_cache_size = 4096K
realpath_cache_ttl = 3600

; Expose PHP desactive en production
expose_php = Off
