# Docker Compose - Production
# Usage : docker compose -f docker-compose.prod.yaml up -d

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: kickstarter-nginx-prod
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/front/dist:ro
      - ./api/public:/var/www/api/public:ro
    depends_on:
      - php
    networks:
      - kickstarter

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: kickstarter-php-prod
    restart: always
    volumes:
      - uploaded_files:/var/www/api/var/uploads
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
    depends_on:
      - database
      - redis
    networks:
      - kickstarter

  database:
    image: postgres:16-alpine
    container_name: kickstarter-database-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kickstarter}
      POSTGRES_USER: ${POSTGRES_USER:-kickstarter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD doit etre defini}
    volumes:
      - database_data:/var/lib/postgresql/data
    networks:
      - kickstarter

  redis:
    image: redis:7-alpine
    container_name: kickstarter-redis-prod
    restart: always
    networks:
      - kickstarter

volumes:
  database_data:
  uploaded_files:
  static_files:

networks:
  kickstarter:
    driver: bridge
