# Docker Compose - Production
# Usage : docker compose -f docker-compose.prod.yaml up -d

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: kickstarter-nginx-prod
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/front/dist:ro
      - ./api/public:/var/www/api/public:ro
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost/api/healthcheck/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - kickstarter

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: kickstarter-php-prod
    restart: always
    volumes:
      - uploaded_files:/var/www/api/var/uploads
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || php -r 'exit(is_resource(fsockopen(\"127.0.0.1\", 9000)) ? 0 : 1);'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - kickstarter

  database:
    image: postgres:16-alpine
    container_name: kickstarter-database-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kickstarter}
      POSTGRES_USER: ${POSTGRES_USER:-kickstarter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD doit etre defini}
    volumes:
      - database_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kickstarter} -d ${POSTGRES_DB:-kickstarter}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kickstarter

  redis:
    image: redis:7-alpine
    container_name: kickstarter-redis-prod
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - kickstarter

volumes:
  database_data:
  uploaded_files:
  static_files:

networks:
  kickstarter:
    driver: bridge
