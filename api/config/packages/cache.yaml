# Configuration du cache
framework:
  cache:
    # Adapter Redis pour le cache applicatif
    app: cache.adapter.redis
    default_redis_provider: '%env(REDIS_URL)%'

    # Pools de cache specifiques
    pools:
      doctrine.result_cache_pool:
        adapter: cache.app
      doctrine.system_cache_pool:
        adapter: cache.system
      cache.api:
        adapter: cache.app
        default_lifetime: 300
      cache.search:
        adapter: cache.app
        default_lifetime: 60
