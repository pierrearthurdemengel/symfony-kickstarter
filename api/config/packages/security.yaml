# Configuration de la securite
security:
  # Algorithme de hachage des mots de passe
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

  # Fournisseurs d'utilisateurs
  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  # Pare-feux
  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    login:
      pattern: ^/api/login
      stateless: true
      json_login:
        check_path: /api/login
        username_path: email
        password_path: password
        success_handler: lexik_jwt_authentication.handler.authentication_success
        failure_handler: lexik_jwt_authentication.handler.authentication_failure

    uploads:
      pattern: ^/uploads
      stateless: true
      security: false

    api:
      pattern: ^/api
      stateless: true
      jwt: ~

  # Controle d'acces
  access_control:
    - { path: ^/api/login, roles: PUBLIC_ACCESS }
    - { path: ^/api/register, roles: PUBLIC_ACCESS, methods: [POST] }
    - { path: ^/api/healthcheck, roles: PUBLIC_ACCESS }
    - { path: ^/api/forgot-password, roles: PUBLIC_ACCESS, methods: [POST] }
    - { path: ^/api/reset-password, roles: PUBLIC_ACCESS, methods: [POST] }
    - { path: ^/api/verify-email, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/uploads, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/docs, roles: PUBLIC_ACCESS }
    - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
  security:
    password_hashers:
      Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
        algorithm: auto
        cost: 4
        time_cost: 3
        memory_cost: 10
