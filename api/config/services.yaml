# Configuration des services
parameters:
  app.frontend_url: '%env(default:app.default_frontend_url:FRONTEND_URL)%'
  app.default_frontend_url: 'http://localhost:8080'
  app.google_client_id: '%env(GOOGLE_CLIENT_ID)%'
  app.google_client_secret: '%env(GOOGLE_CLIENT_SECRET)%'
  app.github_client_id: '%env(GITHUB_CLIENT_ID)%'
  app.github_client_secret: '%env(GITHUB_CLIENT_SECRET)%'
  app.meilisearch_url: '%env(MEILISEARCH_URL)%'
  app.meilisearch_api_key: '%env(MEILISEARCH_API_KEY)%'

services:
  _defaults:
    autowire: true
    autoconfigure: true

  App\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/Entity/'
      - '../src/Kernel.php'

  # Processor pour le hashage des mots de passe utilisateur
  App\State\UserHashPasswordProcessor:
    arguments:
      $persistProcessor: '@api_platform.doctrine.orm.state.persist_processor'

  # Subscriber de rate limiting
  App\EventSubscriber\RateLimiterSubscriber:
    arguments:
      $loginLimiter: '@limiter.login_limiter'
      $registerLimiter: '@limiter.register_limiter'
      $forgotPasswordLimiter: '@limiter.forgot_password_limiter'
      $apiLimiter: '@limiter.api_limiter'

  # Service de recherche Meilisearch
  App\Service\SearchService:
    arguments:
      $meilisearchUrl: '%app.meilisearch_url%'
      $meilisearchApiKey: '%app.meilisearch_api_key%'
