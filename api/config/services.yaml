# Configuration des services
parameters:
  app.frontend_url: '%env(default::FRONTEND_URL)%'

services:
  _defaults:
    autowire: true
    autoconfigure: true

  App\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/Entity/'
      - '../src/Kernel.php'

  # Processor pour le hashage des mots de passe utilisateur
  App\State\UserHashPasswordProcessor:
    arguments:
      $persistProcessor: '@api_platform.doctrine.orm.state.persist_processor'

  # Subscriber de rate limiting
  App\EventSubscriber\RateLimiterSubscriber:
    arguments:
      $loginLimiter: '@limiter.login_limiter'
      $registerLimiter: '@limiter.register_limiter'
      $forgotPasswordLimiter: '@limiter.forgot_password_limiter'
      $apiLimiter: '@limiter.api_limiter'
