name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  backend-tests:
    name: Backend Tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.3', '8.4']

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kickstarter_test
          POSTGRES_USER: kickstarter
          POSTGRES_PASSWORD: kickstarter
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: api

    env:
      APP_ENV: test
      APP_DEBUG: 0
      DATABASE_URL: 'postgresql://kickstarter:kickstarter@localhost:5432/kickstarter_test?serverVersion=16&charset=utf8'
      REDIS_URL: 'redis://localhost:6379'
      REDIS_HOST: 'localhost'
      REDIS_PORT: '6379'
      JWT_PASSPHRASE: kickstarter
      JWT_COOKIE_ENABLED: 'false'
      MESSENGER_TRANSPORT_DSN: 'doctrine://default?auto_setup=0'
      MAILER_DSN: 'null://null'

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installation de PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo_pgsql, intl, zip, redis
          coverage: xdebug

      - name: Cache des dependances Composer
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ runner.os }}-${{ matrix.php-version }}-${{ hashFiles('api/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php-version }}-

      - name: Installation des dependances Composer
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Audit des dependances Composer
        run: composer audit --no-interaction

      - name: Generation des cles JWT pour les tests
        run: |
          mkdir -p config/jwt
          openssl genpkey -algorithm RSA -out config/jwt/private.pem -pkeyopt rsa_keygen_bits:4096 -pass pass:kickstarter
          openssl pkey -in config/jwt/private.pem -out config/jwt/public.pem -pubout -passin pass:kickstarter

      - name: Creation de la base de donnees de test
        run: php bin/console doctrine:database:create --if-not-exists --env=test

      - name: Execution des migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Analyse statique PHPStan
        run: php vendor/bin/phpstan analyse --no-progress

      - name: Verification du style PHP CS Fixer
        run: php vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Tests PHPUnit avec couverture
        run: php vendor/bin/phpunit --coverage-clover coverage.xml --coverage-text | tee coverage-output.txt

      - name: Verification du seuil de couverture backend (70%)
        run: |
          COVERAGE=$(grep -oP 'Lines:\s+\K[\d.]+' coverage-output.txt | head -1)
          echo "Couverture backend : ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 70" | bc -l)" -eq 1 ]; then
            echo "ERREUR : Couverture insuffisante (${COVERAGE}% < 70%)"
            exit 1
          fi

  frontend-tests:
    name: Frontend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']

    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installation de Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Installation des dependances npm
        run: npm ci

      - name: Audit des dependances npm
        run: npm audit --audit-level=high || true

      - name: Verification ESLint
        run: npm run lint

      - name: Verification Prettier
        run: npm run format:check

      - name: Verification TypeScript
        run: npx tsc --noEmit

      - name: Tests Vitest avec couverture
        run: npm run test:coverage

      - name: Verification accessibilite (axe-core)
        run: npm run test:a11y || true

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-tests

    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Installation des dependances npm
        run: npm ci

      - name: Build de production
        run: npm run build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installation de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, intl, zip, redis

      - name: Installation des dependances Composer
        run: cd api && composer install --no-interaction --no-progress --prefer-dist

      - name: Audit Composer (bloquant)
        run: cd api && composer audit --no-interaction

      - name: Installation des dependances npm
        run: cd front && npm ci

      - name: Audit npm (bloquant sur high/critical)
        run: cd front && npm audit --audit-level=high
