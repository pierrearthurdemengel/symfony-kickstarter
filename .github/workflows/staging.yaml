name: Staging

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Annuler les jobs precedents sur la meme PR
concurrency:
  group: staging-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Job 1 : Build et verification de la PR
  # ---------------------------------------------------------------
  staging-build:
    name: Build staging PR #${{ github.event.pull_request.number }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Build de l'image PHP
        run: docker build -f docker/php/Dockerfile.prod -t kickstarter-php:pr-${{ github.event.pull_request.number }} .

      - name: Installation de Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Build du frontend
        run: |
          cd front
          npm ci
          npm run build

      - name: Verification du build de production
        run: echo "Build staging OK pour PR #${{ github.event.pull_request.number }}"

  # ---------------------------------------------------------------
  # Deploiement staging automatise (a adapter)
  # ---------------------------------------------------------------
  # Pour deployer automatiquement chaque PR vers une URL temporaire,
  # adapter selon votre infrastructure :
  #
  # - Coolify : webhook de deploiement par branche
  # - Vercel/Netlify : preview deployments natifs (frontend uniquement)
  # - Kubernetes : namespace ephemere par PR
  # - Docker Compose sur VPS : port dynamique par PR
