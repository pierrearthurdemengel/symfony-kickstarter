name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  # ---------------------------------------------------------------
  # Job 1 : Tests (reutilise le workflow CI)
  # ---------------------------------------------------------------
  tests:
    name: Lancer les tests avant deploiement
    uses: ./.github/workflows/ci.yaml

  # ---------------------------------------------------------------
  # Job 2 : Build des images Docker de production
  # ---------------------------------------------------------------
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Build de l'image PHP production
        run: docker build -f docker/php/Dockerfile.prod -t kickstarter-php:${{ github.ref_name }} .

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Build du frontend
        run: |
          cd front
          npm ci
          npm run build

      # ---------------------------------------------------------
      # Adapter selon la plateforme de deploiement :
      # - Docker Hub : docker/login-action + docker/build-push-action
      # - GitHub Container Registry (ghcr.io)
      # - AWS ECR
      # - Google Artifact Registry
      #
      # Exemple pour GitHub Container Registry :
      #
      # - name: Login to GitHub Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      #
      # - name: Push PHP image
      #   run: |
      #     docker tag kickstarter-php:${{ github.ref_name }} ghcr.io/${{ github.repository }}/php:${{ github.ref_name }}
      #     docker push ghcr.io/${{ github.repository }}/php:${{ github.ref_name }}
      # ---------------------------------------------------------

  # ---------------------------------------------------------------
